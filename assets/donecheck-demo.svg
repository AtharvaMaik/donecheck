<svg width="960" height="520" viewBox="0 0 960 520" xmlns="http://www.w3.org/2000/svg" role="img" aria-labelledby="title desc">
  <title id="title">DoneCheck terminal demo</title>
  <desc id="desc">A terminal-style demo showing DoneCheck blocking an AI coding task without proof, then passing after verification.</desc>
  <rect width="960" height="520" rx="18" fill="#0b1020"/>
  <rect x="32" y="32" width="896" height="456" rx="14" fill="#101827" stroke="#253047"/>
  <circle cx="62" cy="60" r="7" fill="#ff5f57"/>
  <circle cx="86" cy="60" r="7" fill="#ffbd2e"/>
  <circle cx="110" cy="60" r="7" fill="#28c840"/>
  <text x="138" y="66" font-family="ui-monospace, SFMono-Regular, Consolas, monospace" font-size="15" fill="#94a3b8">donecheck demo</text>

  <text x="58" y="118" font-family="ui-monospace, SFMono-Regular, Consolas, monospace" font-size="24" fill="#e2e8f0">$ python donecheck.py --all</text>
  <rect x="58" y="148" width="844" height="136" rx="10" fill="#1b2436" stroke="#334155"/>
  <text x="82" y="188" font-family="ui-monospace, SFMono-Regular, Consolas, monospace" font-size="25" font-weight="700" fill="#fb7185">DoneCheck Receipt: FAIL</text>
  <text x="82" y="226" font-family="ui-monospace, SFMono-Regular, Consolas, monospace" font-size="20" fill="#e2e8f0">- finding: unfinished marker in app.py:2</text>
  <text x="82" y="260" font-family="ui-monospace, SFMono-Regular, Consolas, monospace" font-size="20" fill="#e2e8f0">- commands: none supplied</text>

  <path d="M480 306 v54" stroke="#64748b" stroke-width="3" stroke-linecap="round"/>
  <path d="M462 344 l18 18 18-18" fill="none" stroke="#64748b" stroke-width="3" stroke-linecap="round" stroke-linejoin="round"/>
  <text x="330" y="336" font-family="ui-sans-serif, system-ui, sans-serif" font-size="18" fill="#cbd5e1">fix the file, run the real check</text>

  <text x="58" y="398" font-family="ui-monospace, SFMono-Regular, Consolas, monospace" font-size="24" fill="#e2e8f0">$ python donecheck.py --all --cmd "pytest -q"</text>
  <rect x="58" y="428" width="844" height="40" rx="10" fill="#123524" stroke="#22c55e"/>
  <text x="82" y="456" font-family="ui-monospace, SFMono-Regular, Consolas, monospace" font-size="24" font-weight="700" fill="#86efac">DoneCheck Receipt: PASS</text>
</svg>
