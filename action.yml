name: DoneCheck
description: "Make AI coding agents prove done with local evidence."
inputs:
  command:
    description: "Verification command, for example: pytest -q"
    required: false
    default: ""
  args:
    description: "Extra donecheck args"
    required: false
    default: ""
runs:
  using: composite
  steps:
    - shell: bash
      run: |
        set -euo pipefail
        donecheck=(python "$GITHUB_ACTION_PATH/donecheck.py")
        if [ -n "${GITHUB_BASE_REF:-}" ]; then
          git fetch --no-tags --depth=1 origin "$GITHUB_BASE_REF"
          donecheck+=(--base "origin/$GITHUB_BASE_REF")
        fi
        if [ -n "${{ inputs.command }}" ]; then
          donecheck+=(--cmd "${{ inputs.command }}")
        fi
        if [ -n "${{ inputs.args }}" ]; then
          donecheck+=(${{ inputs.args }})
        fi
        "${donecheck[@]}"
