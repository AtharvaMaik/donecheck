name: DoneCheck
description: "Make AI coding agents prove done with local evidence."
branding:
  icon: check-circle
  color: green
inputs:
  command:
    description: "Verification command, for example: pytest -q"
    required: false
    default: ""
  args:
    description: "Extra donecheck args"
    required: false
    default: ""
runs:
  using: composite
  steps:
    - shell: bash
      env:
        DONECHECK_COMMAND: ${{ inputs.command }}
        DONECHECK_ARGS: ${{ inputs.args }}
      run: |
        set -euo pipefail
        donecheck=(python "$GITHUB_ACTION_PATH/donecheck.py")
        if [ -n "${GITHUB_BASE_REF:-}" ]; then
          git fetch --no-tags origin "$GITHUB_BASE_REF"
          donecheck+=(--base "origin/$GITHUB_BASE_REF")
        fi
        if [ -n "$DONECHECK_COMMAND" ]; then
          donecheck+=(--cmd "$DONECHECK_COMMAND")
        fi
        if [ -n "$DONECHECK_ARGS" ]; then
          mapfile -t extra_args < <(python -c 'import os, shlex; [print(arg) for arg in shlex.split(os.environ["DONECHECK_ARGS"])]')
          donecheck+=("${extra_args[@]}")
        fi
        "${donecheck[@]}"
